name: Deploy Backend to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: ./mvnw clean package -DskipTests -q

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: 13.206.81.60
          EC2_USER: ubuntu
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "$SSH_KEY" | base64 -d > /tmp/ec2_key.pem
          chmod 400 /tmp/ec2_key.pem
          SSH="ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i /tmp/ec2_key.pem $EC2_USER@$EC2_HOST"
          SCP="scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i /tmp/ec2_key.pem"

          echo ">>> Writing environment config..."
          $SSH "sudo mkdir -p /etc/systemd/system/finpulse.service.d"
          $SSH "printf '[Service]\nEnvironment=\"OPENAI_API_KEY=${OPENAI_API_KEY}\"\n' | sudo tee /etc/systemd/system/finpulse.service.d/override.conf > /dev/null"
          $SSH "sudo systemctl daemon-reload"

          echo ">>> Backing up old JAR..."
          $SSH "cp /home/ubuntu/app/lending-platform.jar /home/ubuntu/app/lending-platform.jar.bak 2>/dev/null || true"

          echo ">>> Uploading new JAR..."
          $SCP target/lending-platform-0.0.1-SNAPSHOT.jar $EC2_USER@$EC2_HOST:/home/ubuntu/app/lending-platform.jar

          echo ">>> Restarting service..."
          $SSH "sudo systemctl restart finpulse"

          echo ">>> Waiting for app to start..."
          sleep 60

          echo ">>> Health check..."
          for i in {1..15}; do
            STATUS=$($SSH "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/health" 2>/dev/null) || STATUS="000"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              break
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
            if [ $i -eq 15 ]; then
              echo "Health check failed — printing logs..."
              $SSH "sudo journalctl -u finpulse -n 50 --no-pager"
              echo ">>> Rolling back..."
              $SSH "cp /home/ubuntu/app/lending-platform.jar.bak /home/ubuntu/app/lending-platform.jar && sudo systemctl restart finpulse"
              rm -f /tmp/ec2_key.pem
              exit 1
            fi
          done

          echo ">>> Backend deployed successfully!"
          rm -f /tmp/ec2_key.pem
